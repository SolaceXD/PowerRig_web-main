<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="resources/img/logo__powerrig.png" type="image/png">
    <title>Store - PowerRig</title>
    <link rel="stylesheet" href="resources/bootstrap-5.3.2-dist/bootstrap-5.3.2-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/mystyle.css">
    <script src="js/myscript.js" defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="resources/img/logo__powerrigblanco.png" alt="Logo" width="150" height="30" class="d-inline-block align-text-top">
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="aboutus.html">Acerca de</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contacto</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="favoriteslist.html">Lista de favoritos</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-primary" onclick="openLoginModal()">Login</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Login Modal (same as index) -->
    <div id="loginModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeLoginModal()">&times;</span>
            <h2>Iniciar Sesión</h2>
            <input type="text" placeholder="Usuario" required>
            <input type="email" placeholder="Correo Electrónico" required>
            <input type="password" placeholder="Contraseña" required>
            <button type="button" onclick="handleLogin()">Iniciar Sesión</button>
        </div>
    </div>

    <!-- Chatbot same as index -->
    <button id="chatToggle" class="chat-toggle" title="Chatbot - ¿Qué PC te recomiendo?">💬</button>
    <div id="chatModal" class="chat-modal">
        <div class="chat-container">
            <div class="chat-header">
                <h3>🤖 Asistente PowerRig</h3>
                <span class="close" onclick="closeChatModal()">×</span>
            </div>
            <div id="chatMessages" class="chat-messages">
                <div class="message bot-message">
                    <strong>Asistente:</strong> ¡Hola! Soy el asistente de PowerRig. ¿Qué PC te recomiendo? Dime tu presupuesto o uso.
                </div>
            </div>
            <div class="chat-input-container">
                <input type="text" id="chatInput" placeholder="Escribe tu mensaje..." onkeypress="handleChatKeypress(event)">
                <button onclick="sendChatMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <h2>Productos Disponibles</h2>
        <div class="row">
            <!-- PC Gama Alta id="gama-alta" -->
            <div class="col-md-4">
                <div id="gama-alta" class="card">
                    <img src="resources/img/pcgamergamaalta1.webp" class="card-img-top" alt="PC Gama Alta">
                    <!-- specs as original -->
                    <div class="card-body">
                        <h5 class="card-title">PC Gama Alta</h5>
                        <h5 class="card-text">Precio: $53,345</h5>
                        <!-- Full specs -->
                        <a href="#" class="btn btn-secondary">Comparar</a>
                    </div>
                </div>
            </div>
            <!-- PC Gama Media id="gama-media" -->
            <div class="col-md-4">
                <div id="gama-media" class="card">
                    <!-- content as original -->
                </div>
            </div>
            <!-- PC Gama Baja id="gama-baja" -->
            <div class="col-md-4">
                <div id="gama-baja" class="card">
                    <!-- content as original -->
                </div>
            </div>
            <!-- Other PCs keep as is -->
            <!-- ... full cards from previous read ... -->
        </div>
    </div>
</body>
</html>
